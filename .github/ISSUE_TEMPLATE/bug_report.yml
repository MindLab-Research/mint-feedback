name: Bug Report
description: Report a bug or unexpected behavior in MinT
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below so we can investigate efficiently.

  - type: input
    id: model
    attributes:
      label: Base Model
      description: Which base model were you using?
      placeholder: e.g. Qwen/Qwen3-4B, meta-llama/Llama-3-8B
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include error messages if any.
      placeholder: |
        When I called `optim_step`, the server returned a 500 error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code snippet to reproduce the issue.
      render: python
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Any relevant environment info.
      placeholder: |
        - mindlab-toolkit version: 0.x.x
        - Python version: 3.12
        - OS: Ubuntu 22.04
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste relevant logs or error traces here.
      render: shell
    validations:
      required: false
