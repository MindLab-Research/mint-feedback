name: Question
description: Ask a question about MinT usage
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Ask your question below. We'll respond within 1 business day.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant context — what you're trying to achieve, what you've already tried, etc.
    validations:
      required: false
