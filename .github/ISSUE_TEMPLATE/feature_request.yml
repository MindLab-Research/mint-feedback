name: Feature Request
description: Suggest a new feature or improvement for MinT
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion. Please describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why do you need it?
      placeholder: |
        I'm trying to do X but currently MinT doesn't support...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you think this should work? API shape, behavior, or usage example.
      placeholder: |
        It would be great if the training config accepted an `optimizer` field like:
        {"optimizer": {"type": "muon", "learning_rate": 1e-4}}
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of MinT does this relate to?
      options:
        - Client SDK (mindlab-toolkit)
        - Training backend
        - Documentation
        - Platform / Dashboard
        - Other
    validations:
      required: false
